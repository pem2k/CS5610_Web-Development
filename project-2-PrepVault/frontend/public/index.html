<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrepVault - Personal Interview Prep</title>
    <!-- SEO -->
    <meta
      name="description"
      content="Log, tag, and track interview questions by topic, company, and difficulty. Organize your prep and excel in your tech interviews."
    />
    <!-- styles -->
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/questions.css" />
    <link rel="stylesheet" href="/css/topics.css" />
  </head>
  <body>
    <!-- auth screen -->
    <div class="auth-wrapper" id="auth-container" style="display: none">
      <div class="auth-card fade-in">
        <div class="auth-logo">
          <div class="logo-icon">PV</div>
          <h2>PrepVault</h2>
        </div>
        <p class="auth-subtitle">Elevate your interview preparation</p>

        <!-- login/signup switcher -->
        <div class="auth-tabs">
          <button type="button" class="auth-tab-btn active" id="tab-login">Login</button>
          <button type="button" class="auth-tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- login form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label for="login-email" class="form-label">Email</label>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="Enter email"
              required
            />
          </div>
          <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <div class="password-input-container">
              <input
                type="password"
                id="login-password"
                class="form-control"
                placeholder="Enter password"
                required
              />
              <button
                type="button"
                class="btn-toggle-password"
                id="toggle-login-password"
                title="Show password"
              >
                <svg
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  class="eye-icon"
                  viewBox="0 0 24 24"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn-primary auth-submit-btn"
            style="width: 100%; justify-content: center; padding: 12px"
          >
            Login
          </button>
        </form>

        <!-- signup form -->
        <form id="signup-form" class="auth-form">
          <div class="form-group">
            <label for="signup-username" class="form-label">Username</label>
            <input
              type="text"
              id="signup-username"
              class="form-control"
              placeholder="Min 3 characters"
              required
            />
          </div>
          <div class="form-group">
            <label for="signup-email" class="form-label">Email</label>
            <input
              type="email"
              id="signup-email"
              class="form-control"
              placeholder="Enter email"
              required
            />
          </div>
          <div class="form-group">
            <label for="signup-password" class="form-label">Password</label>
            <div class="password-input-container">
              <input
                type="password"
                id="signup-password"
                class="form-control"
                placeholder="Min 8 chars, 1 special char"
                required
              />
              <button
                type="button"
                class="btn-toggle-password"
                id="toggle-signup-password"
                title="Show password"
              >
                <svg
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  class="eye-icon"
                  viewBox="0 0 24 24"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn-primary auth-submit-btn"
            style="width: 100%; justify-content: center; padding: 12px"
          >
            Create Account
          </button>
        </form>

        <div
          id="auth-error"
          class="auth-error-msg"
          style="
            display: none;
            color: var(--danger);
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
          "
        ></div>
      </div>
    </div>

    <!-- app wrapper -->
    <div class="app-container" id="app-container" style="display: none">
      <!-- sidebar navigation -->
      <aside class="sidebar">
        <div class="logo-container">
          <div class="logo-icon">PV</div>
          <div class="logo-text">PrepVault</div>
        </div>
        <nav>
          <ul class="nav-links">
            <li class="nav-item active" id="nav-dashboard">
              <a href="/dashboard">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="7" height="9"></rect>
                  <rect x="14" y="3" width="7" height="5"></rect>
                  <rect x="14" y="12" width="7" height="9"></rect>
                  <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                Dashboard
              </a>
            </li>
            <li class="nav-item" id="nav-questions">
              <a href="/questions">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                Questions
              </a>
            </li>
            <li class="nav-item" id="nav-topics">
              <a href="/topics">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                  ></path>
                </svg>
                Topics & Companies
              </a>
            </li>
          </ul>
        </nav>
        <div class="sidebar-footer">&copy; 2026 PrepVault v1.0</div>
      </aside>

      <!-- main content area -->
      <div class="main-wrapper">
        <header class="header">
          <h1 class="page-title" id="page-title">Dashboard</h1>
          <div class="user-profile">
            <span class="user-name" id="user-display-name">Loading...</span>
            <div class="avatar" id="user-avatar">U</div>
            <button
              id="btn-logout"
              class="btn-icon"
              title="Logout"
              style="
                margin-left: 12px;
                color: var(--text-muted);
                padding: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </button>
            <button
              id="btn-delete-account"
              class="btn-icon"
              title="Delete Account"
              style="
                margin-left: 8px;
                color: var(--color-hard);
                padding: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                ></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
            </button>
          </div>
        </header>

        <main class="content-container" id="main-content">
          <!-- Rendered views go here -->
        </main>
      </div>
    </div>

    <!-- entrypoint -->
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
